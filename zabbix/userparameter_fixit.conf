# =============================================================================
# userparameter_fixit.conf — Zabbix Agent UserParameter for FIXIT
#
# Deploy to:
#   /etc/zabbix/zabbix_agentd.d/userparameter_fixit.conf
#
# Then restart the Zabbix agent:
#   sudo systemctl restart zabbix-agent
#
# In Zabbix server, create items with the keys listed below.
# =============================================================================

# 1. HTTP health-check — returns 200 when the app is healthy
#    Item type : Zabbix agent
#    Key        : fixit.http.status
#    Value type : Numeric (unsigned)
#    Trigger    : {HOST:fixit.http.status.last()} <> 200
UserParameter=fixit.http.status,curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:5000/health 2>/dev/null || echo 0

# 2. Process running — 1 if gunicorn master is alive, 0 otherwise
#    Item type : Zabbix agent
#    Key        : fixit.process.running
#    Value type : Numeric (unsigned)
#    Trigger    : {HOST:fixit.process.running.last()} = 0
UserParameter=fixit.process.running,pgrep -f "gunicorn.*wsgi:app" > /dev/null 2>&1 && echo 1 || echo 0

# 3. Worker count — number of gunicorn worker processes
#    Item type : Zabbix agent
#    Key        : fixit.process.workers
#    Value type : Numeric (unsigned)
UserParameter=fixit.process.workers,pgrep -c -f "gunicorn.*wsgi:app" 2>/dev/null || echo 0

# 4. Uptime of the gunicorn master process in seconds
#    Item type : Zabbix agent
#    Key        : fixit.process.uptime
#    Value type : Numeric (unsigned)
UserParameter=fixit.process.uptime,/opt/fixit/scripts/fixit_uptime.sh
